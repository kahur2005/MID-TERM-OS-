upstream mini_cloud_controller {
    server controller:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # ── Controller API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://mini_cloud_controller;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Dynamic reverse proxy to service instances ──────────────────────────
    # Nginx forwards /proxy/<id>/* to the controller, which then
    # routes the request to the correct running container.
    location /proxy/ {
        proxy_pass         http://mini_cloud_controller;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Dashboard / root ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://mini_cloud_controller;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
